# PostgreSQL Connection Settings
spring.datasource.url=jdbc:postgresql://localhost:5432/challenge?currentSchema=document_schema
spring.datasource.username=challenge_user
spring.datasource.password=challenge_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000

# Additional Hibernate Properties
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=document_schema
spring.jpa.open-in-view=false

# MinIO Configuration
minio.endpoint=http://localhost:9000
minio.access.key=minio_admin
minio.secret.key=minio_password
minio.bucket.name=document-bucket
# Multipart file configuration for large files
# File upload configuration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.file-size-threshold=2MB
spring.servlet.multipart.resolve-lazily=true

# Server configuration for memory optimization
server.tomcat.max-threads=20
server.tomcat.max-connections=100
server.tomcat.accept-count=10
server.tomcat.max-swallow-size=-1

# OpenAPI/Swagger Configuration
springdoc.swagger-ui.path=/swagger-ui.html