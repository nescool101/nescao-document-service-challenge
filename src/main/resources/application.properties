# PostgreSQL Connection Settings
spring.datasource.url=jdbc:postgresql://localhost:5432/challenge?currentSchema=document_schema
spring.datasource.username=challenge_user
spring.datasource.password=challenge_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000

# Additional Hibernate Properties
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=document_schema
spring.jpa.open-in-view=false

# MinIO Configuration
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.bucket.name=document-bucket
minio.access.key=access-key
minio.secret.key=secret-key

# Multipart file configuration for large files
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# OpenAPI/Swagger Configuration
springdoc.swagger-ui.path=/swagger-ui.html